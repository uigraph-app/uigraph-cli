uigraph-sync:
  stage: deploy
  image: golang:1.23
  script:
    - curl -sSL https://cli.uigraph.app/install.sh | sh
    - uigraph sync
  only:
    - main
    - master
  variables:
    UIGRAPH_TOKEN: $UIGRAPH_TOKEN
  tags:
    - docker

# Optional: Run on merge requests with dry-run
uigraph-sync-dry-run:
  stage: test
  image: golang:1.23
  script:
    - curl -sSL https://cli.uigraph.app/install.sh | sh
    - uigraph sync --dry-run
  only:
    - merge_requests
  variables:
    UIGRAPH_TOKEN: $UIGRAPH_TOKEN
  tags:
    - docker
